<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Detail - Noindex Monitor</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
        <header>
            <div class="header-left">
                <a href="/" class="back-link">&larr; All Clients</a>
                <h1 id="client-name">Loading...</h1>
                <span class="subtitle" id="client-domain"></span>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="exportCSV()">Export CSV</button>
                <button class="btn btn-secondary" onclick="toggleAllowlist()">Manage Allowlist</button>
                <button class="btn btn-primary" onclick="scanClient()">Scan Now</button>
            </div>
        </header>

        <div class="stats-bar" id="stats-bar"></div>

        <div class="search-row">
            <input type="text" id="search" placeholder="Filter URLs..." oninput="renderURLs()">
            <select id="status-filter" onchange="renderURLs()">
                <option value="all">All</option>
                <option value="fail">Fails Only</option>
                <option value="pass">Pass Only</option>
                <option value="allowlisted">Allowlisted</option>
            </select>
        </div>

        <div class="url-table-wrap">
            <table class="url-table" id="url-table">
                <thead>
                    <tr>
                        <th class="col-status">Status</th>
                        <th class="col-url">URL</th>
                        <th class="col-checked">Last Checked</th>
                        <th class="col-actions">Actions</th>
                    </tr>
                </thead>
                <tbody id="url-tbody">
                    <tr><td colspan="4" class="loading">Loading URLs...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Allowlist modal -->
        <div class="modal-overlay hidden" id="allowlist-modal">
            <div class="modal">
                <div class="modal-header">
                    <h2>Allowlist</h2>
                    <button class="btn-close" onclick="toggleAllowlist()">&times;</button>
                </div>
                <div class="modal-body">
                    <p>URLs on the allowlist are expected to have noindex and won't count as failures.</p>
                    <div class="allowlist-add">
                        <input type="text" id="allowlist-input" placeholder="Paste full URL to allowlist">
                        <button class="btn btn-primary" onclick="addAllowlist()">Add</button>
                    </div>
                    <ul id="allowlist-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script>
        const CLIENT_ID = {{ client_id }};
    </script>
    <script src="/static/js/client_detail.js"></script>
</body>
</html>
